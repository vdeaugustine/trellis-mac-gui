name: TrellisStudio
options:
  bundleIdPrefix: com.vinware
targets:
  TrellisStudio:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: TrellisStudio
        excludes:
          - "BackendBundle/**"
    postCompileScripts:
      - name: "Bundle Backend Scripts"
        script: |
          BACKEND_SRC="$SRCROOT/TrellisStudio/BackendBundle"
          BACKEND_DST="$BUILT_PRODUCTS_DIR/$CONTENTS_FOLDER_PATH/Resources/BackendBundle"
          mkdir -p "$BACKEND_DST"
          # Copy from the pre-populated source directory
          cp -R "$BACKEND_SRC/" "$BACKEND_DST/"
          echo "Copied BackendBundle to $BACKEND_DST"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vinware.trellis-studio
        INFOPLIST_FILE: TrellisStudio/Info.plist
        CODE_SIGN_ENTITLEMENTS: TrellisStudio/TrellisStudio.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
  TrellisStudioTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: TrellisStudioTests
    dependencies:
      - target: TrellisStudio
    settings:
      base:
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
  TrellisStudioUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: TrellisStudioUITests
    dependencies:
      - target: TrellisStudio
    settings:
      base:
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES

